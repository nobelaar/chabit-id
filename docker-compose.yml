services:
  app:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      PG_HOST: chabit-postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DATABASE: ${PG_DATABASE}
      PG_POOL_MAX: 20
      PG_IDLE_TIMEOUT_MS: 30000
      PG_CONNECTION_TIMEOUT_MS: 5000
      JWT_SECRET: ${JWT_SECRET}
      OTP_HMAC_SECRET: ${OTP_HMAC_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-redis://chabit-redis:6379}
      WEBHOOK_BACKEND_URL: ${WEBHOOK_BACKEND_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-host-gateway}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-devchabit@gmail.com}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://host-gateway:9000}
      S3_BUCKET: ${S3_BUCKET:-chabit}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_REGION: us-east-1
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - default
      - backend_chabit
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  seed:
    build:
      context: .
      target: builder
    command: npx tsx src/seed.ts
    environment:
      PG_HOST: chabit-postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DATABASE: ${PG_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      OTP_HMAC_SECRET: ${OTP_HMAC_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WEBHOOK_BACKEND_URL: http://backend-chabit-app-1:3000/internal/webhooks/identity
    networks:
      - default
      - backend_chabit
    profiles:
      - seed

networks:
  backend_chabit:
    external: true
    name: backend-chabit_default
